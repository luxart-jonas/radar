<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Radar · Flugverfolgung</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --bg: #060a0d;
    --panel: #0c1318;
    --panel-line: #1b2830;
    --phosphor: #5eead4;
    --phosphor-dim: #2a5a52;
    --amber: #ffb454;
    --text: #d7e4e2;
    --text-dim: #6b8580;
    --danger: #ff6b6b;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }
  #app{ display:flex; flex-direction:column; height:100dvh; }

  header{
    position:relative;
    padding: 14px 18px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-line);
    z-index: 20;
  }
  .title-row{
    display:flex; align-items:baseline; gap:10px; margin-bottom:12px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 19px;
    letter-spacing: 0.02em;
    margin:0;
    color: var(--phosphor);
  }
  .sub{ font-size:11px; color: var(--text-dim); letter-spacing:0.04em; }

  .radar-sweep{
    position:absolute; top:14px; right:18px;
    width:28px; height:28px;
    border-radius:50%;
    border:1px solid var(--phosphor-dim);
    overflow:hidden;
  }
  .radar-sweep::before{
    content:''; position:absolute; inset:0;
    background: conic-gradient(from 0deg, transparent 0deg, transparent 260deg, var(--phosphor) 300deg, transparent 340deg);
    animation: sweep 3s linear infinite;
  }
  .radar-sweep.paused::before{ animation-play-state: paused; }
  @keyframes sweep{ to{ transform: rotate(360deg); } }

  form{ display:flex; gap:8px; }
  input[type="text"]{
    flex:1;
    background: #08100f;
    border: 1px solid var(--panel-line);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 12px;
    border-radius: 4px;
    outline: none;
  }
  input[type="text"]:focus{ border-color: var(--phosphor-dim); }
  input[type="text"]::placeholder{ color: var(--text-dim); text-transform: none; letter-spacing:0; }

  button{
    background: var(--phosphor);
    color: #04211d;
    border:none;
    font-family: 'Space Grotesk', sans-serif;
    font-weight:600;
    font-size: 13px;
    letter-spacing:0.03em;
    padding: 0 18px;
    border-radius: 4px;
    cursor:pointer;
    transition: filter 0.15s ease;
  }
  button:hover{ filter: brightness(1.12); }
  button:disabled{ background: var(--phosphor-dim); color: #0d2622; cursor:default; }

  #status-bar{
    display:flex; justify-content:space-between; align-items:center;
    padding: 8px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-line);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    z-index: 15;
  }
  #status-bar .dot{
    display:inline-block; width:7px; height:7px; border-radius:50%;
    margin-right:6px; background: var(--text-dim);
  }
  #status-bar.live .dot{ background: var(--phosphor); box-shadow: 0 0 6px var(--phosphor); }
  #status-bar.error .dot{ background: var(--danger); }

  #map{ flex:1; background: #0a1014; }

  /* Leaflet dark tuning */
  .leaflet-container{ background: #0a1014; }
  .leaflet-control-attribution{
    background: rgba(6,10,13,0.75) !important;
    color: var(--text-dim) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a{ color: var(--text-dim) !important; }
  .leaflet-control-zoom a{
    background: var(--panel) !important;
    color: var(--phosphor) !important;
    border-color: var(--panel-line) !important;
  }

  .plane-icon{
    filter: drop-shadow(0 0 6px rgba(94,234,212,0.8));
    transform-origin: center;
  }

  #info-card{
    position:absolute; left:14px; bottom:14px;
    background: rgba(12,19,24,0.92);
    border: 1px solid var(--panel-line);
    border-radius: 6px;
    padding: 12px 16px;
    min-width: 200px;
    z-index: 400;
    backdrop-filter: blur(4px);
    display:none;
  }
  #info-card.visible{ display:block; }
  #info-card .callsign{
    font-family:'Space Grotesk', sans-serif;
    font-size: 18px; font-weight:700; color: var(--phosphor);
    letter-spacing: 0.04em;
  }
  #info-card .row{
    display:flex; justify-content:space-between; gap:16px;
    font-size: 11px; color: var(--text-dim);
    margin-top: 6px;
  }
  #info-card .row b{ color: var(--text); font-weight:600; }
  #info-card .ground-badge{
    display:inline-block; margin-top:8px;
    font-size:10px; letter-spacing:0.05em;
    padding: 2px 7px; border-radius: 3px;
    background: rgba(255,180,84,0.12); color: var(--amber);
    border: 1px solid rgba(255,180,84,0.3);
  }

  #empty-state{
    position:absolute; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap: 8px;
    text-align:center; padding: 20px;
    pointer-events:none;
  }
  #empty-state h2{
    font-family:'Space Grotesk', sans-serif;
    color: var(--text-dim); font-size:15px; font-weight:500;
    max-width: 320px; line-height:1.5; margin:0;
  }
  #empty-state .code{ color: var(--phosphor-dim); font-size:12px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="radar-sweep paused" id="sweep"></div>
    <div class="title-row">
      <h1>RADAR</h1>
      <span class="sub">live position via ADS-B</span>
    </div>
    <form id="search-form" autocomplete="off">
      <input type="text" id="flight-input" placeholder="Flugnummer, z.B. LH441" maxlength="10">
      <button type="submit" id="search-btn">Suchen</button>
    </form>
  </header>

  <div id="status-bar">
    <span><span class="dot"></span><span id="status-text">Bereit</span></span>
    <span id="last-update"></span>
  </div>

  <div style="position:relative; flex:1;">
    <div id="map"></div>
    <div id="empty-state">
      <h2 id="empty-text">Flugnummer eingeben und suchen.<br>Die Position wird alle 60&nbsp;Sekunden aktualisiert.</h2>
    </div>
    <div id="info-card">
      <div class="callsign" id="info-callsign">—</div>
      <div class="row"><span>Höhe</span><b id="info-alt">—</b></div>
      <div class="row"><span>Geschwindigkeit</span><b id="info-speed">—</b></div>
      <div class="row"><span>zuletzt gemeldet</span><b id="info-age">—</b></div>
      <div id="ground-badge" class="ground-badge" style="display:none;">AM BODEN</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  // --- IATA -> ICAO Airline-Code Zuordnung (gängige Airlines, Schwerpunkt Europa) ---
  const AIRLINE_MAP = {
    'LH':'DLH','LX':'SWR','OS':'AUA','SN':'BEL','LG':'LGL',
    'BA':'BAW','BY':'EXS','VS':'VIR','EI':'EIN',
    'AF':'AFR','KL':'KLM','TP':'TAP','IB':'IBE','VY':'VLG','UX':'AEA',
    'EW':'EWG','4U':'GWI','FR':'RYR','U2':'EZY','W6':'WZZ','PC':'PGT','DE':'CFG','X3':'TUI',
    'SK':'SAS','AY':'FIN','D8':'IBK','DY':'NAX',
    'DL':'DAL','UA':'UAL','AA':'AAL','B6':'JBU','WN':'SWA','AC':'ACA','AS':'ASA',
    'EK':'UAE','QR':'QTR','EY':'ETD','SV':'SVA','TK':'THY','MS':'MSR','RJ':'RJA','LY':'ELY','G9':'ABY',
    'SQ':'SIA','CX':'CPA','JL':'JAL','NH':'ANA','QF':'QFA','NZ':'ANZ','CA':'CCA','MU':'CES','CZ':'CSN',
    'SU':'AFL','LO':'LOT','OK':'CSA','RO':'ROT','JU':'ASL','A3':'AEE'
  };

  const STORAGE_KEY = 'radar_last_flight';
  const REFRESH_MS = 60000;

  let map, marker, timer, countdownTimer, currentCandidates = [];

  function initMap(){
    map = L.map('map', { zoomControl:true, attributionControl:true }).setView([50.9, 7.0], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(map);
  }

  function planeSvg(heading){
    const rot = (heading ?? 0);
    return `<div class="plane-icon" style="transform:rotate(${rot}deg)">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
        <path d="M12 1.5 L15 10 L22 14 L22 16.5 L15 14.5 L15 19.5 L18.5 22 L18.5 23.5 L12 22 L5.5 23.5 L5.5 22 L9 19.5 L9 14.5 L2 16.5 L2 14 L9 10 Z"
          fill="#5eead4" stroke="#04211d" stroke-width="0.6"/>
      </svg>
    </div>`;
  }

  function setStatus(kind, text){
    const bar = document.getElementById('status-bar');
    bar.className = kind;
    document.getElementById('status-text').textContent = text;
  }

  function setSweep(active){
    document.getElementById('sweep').classList.toggle('paused', !active);
  }

  function buildCandidates(raw){
    const clean = raw.trim().toUpperCase().replace(/\s+/g,'');
    if(!clean) return [];
    const m = clean.match(/^([A-Z0-9]{2,3}?)(\d{1,4}[A-Z]?)$/);
    const candidates = new Set([clean]);
    if(m){
      const [, iata, num] = m;
      const icao = AIRLINE_MAP[iata];
      if(icao) candidates.add(icao + num);
    }
    return Array.from(candidates);
  }

  const PROXY_URL = 'https://ormpszktwwiahjooukjk.supabase.co/functions/v1/super-action';

  async function fetchPosition(candidates){
    for(const cs of candidates){
      const res = await fetch(PROXY_URL + '?callsign=' + encodeURIComponent(cs));
      if(!res.ok) continue;
      const data = await res.json();
      if(data.ac && data.ac.length > 0){
        const a = data.ac[0];
        const onGround = a.alt_baro === 'ground';
        return {
          callsign: (a.flight || cs).trim(),
          lat: a.lat, lon: a.lon,
          onGround: onGround,
          altFt: onGround ? null : (typeof a.alt_baro === 'number' ? a.alt_baro : (a.alt_geom ?? null)),
          speedKmh: a.gs != null ? Math.round(a.gs * 1.852) : null,
          heading: a.track ?? 0,
          ageSec: a.seen_pos != null ? Math.round(a.seen_pos) : (a.seen != null ? Math.round(a.seen) : null)
        };
      }
    }
    return null;
  }

  function renderResult(pos){
    document.getElementById('empty-state').style.display = 'none';
    const latlng = [pos.lat, pos.lon];
    const icon = L.divIcon({ html: planeSvg(pos.heading), className:'', iconSize:[34,34], iconAnchor:[17,17] });
    if(marker){ marker.setLatLng(latlng); marker.setIcon(icon); }
    else { marker = L.marker(latlng, { icon }).addTo(map); }

    const targetZoom = pos.onGround ? 16 : Math.max(map.getZoom(), 9);
    map.setView(latlng, targetZoom, { animate:true });

    const card = document.getElementById('info-card');
    card.classList.add('visible');
    document.getElementById('info-callsign').textContent = pos.callsign;
    document.getElementById('info-alt').textContent = pos.onGround ? '—' : (pos.altFt != null ? Math.round(pos.altFt) + ' ft' : '—');
    document.getElementById('info-speed').textContent = pos.onGround ? '—' : (pos.speedKmh != null ? pos.speedKmh + ' km/h' : '—');
    document.getElementById('info-age').textContent = pos.ageSec != null ? 'vor ' + pos.ageSec + ' s' : '—';
    document.getElementById('ground-badge').style.display = pos.onGround ? 'inline-block' : 'none';

    setStatus('live', pos.callsign + ' gefunden');
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('de-DE');
  }

  function renderNotFound(){
    document.getElementById('info-card').classList.remove('visible');
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('empty-text').innerHTML =
      'Aktuell keine Position gefunden.<br><span class="code">Flugzeug ggf. noch nicht gestartet, ' +
      'am Boden ohne ADS-B-Abdeckung, oder Flugnummer falsch.</span>';
    setStatus('error', 'kein Signal');
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('de-DE');
  }

  async function runSearch(){
    if(currentCandidates.length === 0) return;
    setSweep(true);
    setStatus('', 'suche …');
    try{
      const pos = await fetchPosition(currentCandidates);
      if(pos) renderResult(pos);
      else renderNotFound();
    }catch(err){
      setStatus('error', 'Fehler: ' + err.message);
    }finally{
      setSweep(false);
    }
  }

  function startPolling(){
    if(timer) clearInterval(timer);
    timer = setInterval(runSearch, REFRESH_MS);
  }

  document.getElementById('search-form').addEventListener('submit', function(e){
    e.preventDefault();
    const raw = document.getElementById('flight-input').value;
    const candidates = buildCandidates(raw);
    if(candidates.length === 0) return;
    currentCandidates = candidates;
    try{ localStorage.setItem(STORAGE_KEY, raw.trim().toUpperCase()); }catch(_){}
    runSearch();
    startPolling();
  });

  initMap();

  let saved = null;
  try{ saved = localStorage.getItem(STORAGE_KEY); }catch(_){}
  if(saved){
    document.getElementById('flight-input').value = saved;
    currentCandidates = buildCandidates(saved);
    runSearch();
    startPolling();
  }
})();
</script>
</body>
</html>
